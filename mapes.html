<!-- ── ILLA FILTER BAR ── -->
<div class="mp-illes">
  <button class="mp-illa-btn active" data-illa="">🌐 Totes</button>
  <button class="mp-illa-btn" data-illa="sm">🌋 São Miguel</button>
  <button class="mp-illa-btn" data-illa="pi">⛰️ Pico</button>
  <button class="mp-illa-btn" data-illa="sj">🏔️ São Jorge</button>
  <button class="mp-illa-btn" data-illa="fa">⚓ Faial</button>
</div>

<!-- ── MAP WRAP ── -->
<div class="mp-wrap">

  <!-- Leaflet map -->
  <div id="mp-map"></div>

  <!-- Loading overlay -->
  <div id="mp-loading" class="mp-loading">
    <span class="mp-loading-ico">🗺️</span>
    <span class="mp-loading-text">Carregant el mapa…</span>
  </div>

  <!-- Panel toggle button (shown when panel is closed) -->
  <button id="mp-panel-toggle" class="mp-panel-toggle" style="display:none">
    ☰ Capes
  </button>

  <!-- Layer panel -->
  <div id="mp-panel" class="mp-panel">
    <div class="mp-panel-head">
      <span>🗂️ Capes</span>
      <button id="mp-panel-close" class="mp-panel-close" title="Tancar">✕</button>
    </div>
    <div id="mp-panel-body" class="mp-panel-body">
      <!-- generated by mapes.js -->
    </div>
  </div>

  <!-- Info panel -->
  <div id="mp-info" class="mp-info">
    <div class="mp-info-header">
      <span id="mp-info-head-capa" class="mp-info-capa"></span>
      <button id="mp-info-close" class="mp-info-close" title="Tancar">✕</button>
    </div>
    <div id="mp-info-body" class="mp-info-body">
      <!-- filled by mapes.js -->
    </div>
  </div>

  <!-- Map controls -->
  <div class="mp-ctrls">
    <button id="mp-fit" class="mp-ctrl-btn" title="Ajusta la vista a les capes actives">⊞</button>
    <button id="mp-geo" class="mp-ctrl-btn" title="La meva posició">📍</button>
    <div class="mp-basemap-sel">
      <select id="mp-basemap" title="Fons del mapa">
        <option value="voyager" selected>Voyager</option>
        <option value="clar">Clar</option>
        <option value="topo">Topo</option>
        <option value="satellit">Satèl·lit</option>
      </select>
    </div>
  </div>

</div><!-- /.mp-wrap -->

<!-- Scripts: data first, logic after, app.js last -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

<script src="js/material-extra-data.js"></script>
<script src="js/mapes.js"></script>
<script src="js/app.js"></script>
</body>
