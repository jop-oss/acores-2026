  <main class="ruleta-main">
    <div class="ruleta-header">
      <h1>Ruleta de decisions</h1>
      <p class="ruleta-subtitle">Qui ho fa?</p>
    </div>

    <!-- Pregunta -->
    <div class="pregunta-bloc">
      <div class="pregunta-select-wrap">
        <select id="pregunta-select">
          <option value="">— Tria una pregunta —</option>
          <option>Qui paga el cafè?</option>
          <option>Qui paga el dinar/sopar?</option>
          <option>Qui tria el restaurant?</option>
          <option>Qui porta la motxilla?</option>
          <option>Qui demana al cambrer?</option>
          <option>Qui decideix què fem ara?</option>
          <option>Qui tria la música?</option>
          <option>Qui condueix?</option>
          <option>Qui va al seient de copilot?</option>
          <option>A quin cotxe va la Mons?</option>
          <option>Quin mòbil fem servir per guiar-nos?</option>
          <option>Qui es dutxa primer?</option>
          <option>Qui va a comprar?</option>
        </select>
      </div>
      <div class="pregunta-custom-wrap">
        <input type="text" id="pregunta-custom" placeholder="O escriu la teva pregunta..." maxlength="60">
      </div>
      <div class="pregunta-display" id="pregunta-display">Qui ho fa?</div>
    </div>

    <!-- Participants -->
    <div class="participants-bloc">
      <p class="participants-label">Participants</p>
      <div class="participants-grid" id="participants-grid"></div>
    </div>

    <!-- Canvas ruleta -->
    <div class="canvas-wrap">
      <div class="canvas-container">
        <div class="pin-top"></div>
        <canvas id="ruleta-canvas" width="340" height="340"></canvas>
        <div class="center-btn-wrap">
          <button class="spin-btn" id="spin-btn" onclick="spinRuleta()">GIRA</button>
        </div>
      </div>
    </div>

    <!-- Resultat -->
    <div class="resultat-bloc" id="resultat-bloc" style="display:none">
      <div class="resultat-inner">
        <div class="resultat-emoji" id="resultat-emoji"></div>
        <div class="resultat-nom" id="resultat-nom"></div>
        <div class="resultat-pregunta" id="resultat-pregunta"></div>
      </div>
    </div>

    <!-- Historial -->
    <div class="historial-bloc">
      <div class="historial-header">
        <span class="historial-title">Historial</span>
      </div>
      <div class="historial-list" id="historial-list">
        <p class="historial-buit">Encara no hi ha resultats</p>
      </div>
    </div>
  </main>

  <div id="confetti-container"></div>
  <div id="guanyador-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:500;pointer-events:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.6)">
    <div id="guanyador-popup" style="display:flex;flex-direction:column;align-items:center;gap:12px;animation:zoomIn 0.4s ease">
      <div id="guanyador-cercle" style="width:180px;height:180px;border-radius:50%;overflow:hidden;border:5px solid #6aab7a;background:#0a1628"></div>
      <div id="guanyador-nom-overlay" style="font-size:2rem;font-weight:800;color:#a8d8b0;text-shadow:0 2px 12px rgba(0,0,0,0.8)"></div>
    </div>
  </div>
