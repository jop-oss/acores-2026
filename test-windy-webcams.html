<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prova · Webcams Windy Açores</title>
<style>
  body {
    background: #0a1628;
    color: #e8f4f8;
    font-family: system-ui, sans-serif;
    padding: 24px;
    max-width: 1100px;
    margin: 0 auto;
  }
  h1 { color: #a8d8b0; font-size: 1.5rem; }
  .subtitle { color: #6aab7a; font-size: 0.9rem; margin-bottom: 24px; }
  .status {
    background: #0f2318;
    border: 1px solid #2d5a3d;
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 24px;
    font-size: 0.9rem;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .status.error { border-color: #ef4444; color: #fca5a5; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 18px;
  }
  .cam-card {
    background: #0f2318;
    border: 1px solid #2d5a3d;
    border-radius: 12px;
    overflow: hidden;
  }
  .cam-img-wrap {
    aspect-ratio: 4/3;
    background: #0a1628;
    overflow: hidden;
  }
  .cam-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .cam-info { padding: 10px 14px; }
  .cam-title { color: #a8d8b0; font-weight: 600; font-size: 0.9rem; margin-bottom: 4px; }
  .cam-loc { color: #6aab7a; font-size: 0.75rem; }
  .cam-noimg {
    display: flex; align-items: center; justify-content: center;
    height: 100%; color: #6aab7a; font-size: 0.8rem; text-align: center; padding: 12px;
  }
  pre {
    background: #0f2318; border: 1px solid #2d5a3d; border-radius: 10px;
    padding: 14px; overflow-x: auto; font-size: 0.75rem; color: #a8d8b0;
  }
</style>
</head>
<body>

<h1>🌬️ Prova: Webcams de Windy per a les Açores</h1>
<p class="subtitle">Aquesta pàgina és només una prova aïllada — no toca res del web real. Obre-la directament al navegador (fent doble clic al fitxer, o arrossegant-la a una pestanya).</p>

<div id="status" class="status">Consultant l'API de Windy...</div>
<div id="grid" class="grid"></div>

<script>
const WINDY_KEY = "RFX87wOopVv0oQ8HlifoUNlSYukIAkhy";

const variants = [
  { label: "countries=PT, limit=50, include=location,player,images",
    url: `https://api.windy.com/webcams/api/v3/webcams?lang=en&limit=50&offset=0&countries=PT&include=location,player,images` },
];

const statusEl = document.getElementById("status");
const gridEl = document.getElementById("grid");
statusEl.textContent = "Provant...";

async function tryVariant(v) {
  const div = document.createElement("div");
  div.className = "status";
  div.style.marginBottom = "10px";
  div.textContent = `⏳ ${v.label}...`;
  statusEl.after(div);
  try {
    const res = await fetch(v.url, { headers: { "x-windy-api-key": WINDY_KEY } });
    const bodyText = await res.text();
    if (!res.ok) {
      div.textContent = `❌ ${v.label} → HTTP ${res.status}: ${bodyText.slice(0, 200)}`;
      div.classList.add("error");
      return null;
    }
    const data = JSON.parse(bodyText);
    const n = data.webcams ? data.webcams.length : (data.result?.webcams?.length ?? "?");
    div.textContent = `✅ ${v.label} → ${n} webcams`;
    return data;
  } catch (e) {
    div.textContent = `❌ ${v.label} → ${e.message}`;
    div.classList.add("error");
    return null;
  }
}

(async () => {
  let firstGood = null;
  for (const v of variants) {
    const data = await tryVariant(v);
    if (data && !firstGood) firstGood = data;
  }
  statusEl.textContent = firstGood
    ? "Resultats (fixa't especialment en els que siguin de les Açores):"
    : "Cap variant ha funcionat. Mira els detalls de cada intent a sobre.";

  const cams = firstGood?.webcams || firstGood?.result?.webcams || [];
  const isAzoresCam = c => /az?ores/i.test(c.location?.region || "") || /az?ores/i.test(c.title || "");
  cams.sort((a, b) => (isAzoresCam(b) ? 1 : 0) - (isAzoresCam(a) ? 1 : 0));
    if (cams.length === 0) {
      statusEl.textContent = "L'API ha respost correctament, però no ha retornat cap webcam per a aquesta zona (bbox).";
      statusEl.classList.add("error");
      return;
    }
    statusEl.textContent = `✅ L'API ha retornat ${cams.length} webcams a la zona de les Açores.`;

    cams.forEach(cam => {
      const imgUrl = cam.images?.current?.preview || cam.images?.current?.thumbnail || "";
      const title = cam.title || "Sense nom";
      const region = cam.location?.region || "";
      const loc = cam.location
        ? [cam.location.city, cam.location.region, cam.location.country].filter(Boolean).join(", ")
        : "Ubicació desconeguda";
      const isAzores = isAzoresCam(cam);

      const card = document.createElement("div");
      card.className = "cam-card";
      if (isAzores) card.style.borderColor = "#fbbf24";
      card.innerHTML = `
        <div class="cam-img-wrap">
          ${imgUrl
            ? `<img src="${imgUrl}" alt="${title}" loading="lazy">`
            : `<div class="cam-noimg">Sense imatge de previsualització</div>`}
        </div>
        <div class="cam-info">
          <div class="cam-title">${isAzores ? "🌟 " : ""}${title}</div>
          <div class="cam-loc">${loc}</div>
        </div>
      `;
      gridEl.appendChild(card);
    });
})();
</script>

</body>
</html>
