<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prova · Webcams Windy Açores</title>
<style>
  body {
    background: #0a1628;
    color: #e8f4f8;
    font-family: system-ui, sans-serif;
    padding: 24px;
    max-width: 1100px;
    margin: 0 auto;
  }
  h1 { color: #a8d8b0; font-size: 1.5rem; }
  .subtitle { color: #6aab7a; font-size: 0.9rem; margin-bottom: 24px; }
  .status {
    background: #0f2318;
    border: 1px solid #2d5a3d;
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 24px;
    font-size: 0.9rem;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .status.error { border-color: #ef4444; color: #fca5a5; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 18px;
  }
  .cam-card {
    background: #0f2318;
    border: 1px solid #2d5a3d;
    border-radius: 12px;
    overflow: hidden;
  }
  .cam-img-wrap {
    aspect-ratio: 4/3;
    background: #0a1628;
    overflow: hidden;
  }
  .cam-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .cam-info { padding: 10px 14px; }
  .cam-title { color: #a8d8b0; font-weight: 600; font-size: 0.9rem; margin-bottom: 4px; }
  .cam-loc { color: #6aab7a; font-size: 0.75rem; }
  .cam-noimg {
    display: flex; align-items: center; justify-content: center;
    height: 100%; color: #6aab7a; font-size: 0.8rem; text-align: center; padding: 12px;
  }
  pre {
    background: #0f2318; border: 1px solid #2d5a3d; border-radius: 10px;
    padding: 14px; overflow-x: auto; font-size: 0.75rem; color: #a8d8b0;
  }
</style>
</head>
<body>

<h1>🌬️ Prova: Webcams de Windy per a les Açores</h1>
<p class="subtitle">Aquesta pàgina és només una prova aïllada — no toca res del web real. Obre-la directament al navegador (fent doble clic al fitxer, o arrossegant-la a una pestanya).</p>

<div id="status" class="status">Consultant l'API de Windy...</div>
<div id="grid" class="grid"></div>

<script>
const WINDY_KEY = "RFX87wOopVv0oQ8HlifoUNlSYukIAkhy";
const PAGE_SIZE = 50;

const statusEl = document.getElementById("status");
const gridEl = document.getElementById("grid");
statusEl.textContent = "Recorrent totes les pàgines de webcams de Portugal...";

async function fetchPage(offset) {
  const url = `https://api.windy.com/webcams/api/v3/webcams?lang=en&limit=${PAGE_SIZE}&offset=${offset}&countries=PT&include=location,player,images`;
  const res = await fetch(url, { headers: { "x-windy-api-key": WINDY_KEY } });
  const bodyText = await res.text();
  if (!res.ok) throw new Error(`HTTP ${res.status}: ${bodyText.slice(0, 200)}`);
  return JSON.parse(bodyText);
}

(async () => {
  let allCams = [];
  let offset = 0;
  let total = null;
  const progressDiv = document.createElement("div");
  progressDiv.className = "status";
  statusEl.after(progressDiv);

  try {
    while (true) {
      const data = await fetchPage(offset);
      const cams = data.webcams || data.result?.webcams || [];
      if (total === null) total = data.total ?? data.result?.total ?? null;
      allCams = allCams.concat(cams);
      progressDiv.textContent = `⏳ Pàgina offset=${offset}: +${cams.length} webcams (acumulat: ${allCams.length}${total !== null ? ` de ${total}` : ""})`;
      if (cams.length < PAGE_SIZE) break; // última pàgina
      offset += PAGE_SIZE;
      if (offset >= 500) break; // límit de seguretat
    }
    progressDiv.textContent = `✅ Total recorregut: ${allCams.length} webcams de Portugal${total !== null ? ` (l'API en reporta ${total} en total)` : ""}`;
  } catch (e) {
    progressDiv.textContent = `❌ Error a la pàgina offset=${offset}: ${e.message}`;
    progressDiv.classList.add("error");
  }

  const isAzoresCam = c => /az?ores/i.test(c.location?.region || "") || /az?ores/i.test(c.title || "");
  const azoresCams = allCams.filter(isAzoresCam);

  statusEl.textContent = `De ${allCams.length} webcams portugueses, ${azoresCams.length} són de les Açores:`;

  const cams = azoresCams.length > 0 ? azoresCams : allCams;
  cams.sort((a, b) => (isAzoresCam(b) ? 1 : 0) - (isAzoresCam(a) ? 1 : 0));
    if (cams.length === 0) {
      statusEl.textContent = "L'API ha respost correctament, però no ha retornat cap webcam per a aquesta zona (bbox).";
      statusEl.classList.add("error");
      return;
    }
    statusEl.textContent = `✅ L'API ha retornat ${cams.length} webcams a la zona de les Açores.`;

    cams.forEach(cam => {
      const imgUrl = cam.images?.current?.preview || cam.images?.current?.thumbnail || "";
      const title = cam.title || "Sense nom";
      const region = cam.location?.region || "";
      const loc = cam.location
        ? [cam.location.city, cam.location.region, cam.location.country].filter(Boolean).join(", ")
        : "Ubicació desconeguda";
      const isAzores = isAzoresCam(cam);

      const card = document.createElement("div");
      card.className = "cam-card";
      if (isAzores) card.style.borderColor = "#fbbf24";
      card.innerHTML = `
        <div class="cam-img-wrap">
          ${imgUrl
            ? `<img src="${imgUrl}" alt="${title}" loading="lazy">`
            : `<div class="cam-noimg">Sense imatge de previsualització</div>`}
        </div>
        <div class="cam-info">
          <div class="cam-title">${isAzores ? "🌟 " : ""}${title}</div>
          <div class="cam-loc">${loc}</div>
        </div>
      `;
      gridEl.appendChild(card);
    });
})();
</script>

</body>
</html>
